<!doctype html>
<html lang="ja">
  <head>
    <!-- =====================================
         基本設定
    ====================================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />

    <!-- =====================================
         タイトル & ベース SEO
    ====================================== -->
    <title>KISUI | 静けさの中にある美しさ</title>

    <meta
      name="description"
      content="KISUI（綺水）は、肌と心に“静かな透明感”を届けるスキンケアウォーター。水のように軽く、敏感肌でも使いやすい、無香料・低刺激の化粧水です。"
    />
    <meta
      name="keywords"
      content="KISUI, 綺水, 化粧水, スキンケア, 敏感肌, 無香料, 保湿, 透明感, 美容液, スキンケアウォーター"
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://kisui.vercel.app/" />

    <!-- =====================================
         Favicon / App Icons
         ※ 全サイズ対応
    ====================================== -->
    <!-- 最重要：16 / 32 -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- 拡張サイズ（主要ブラウザ対応） -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />

    <!-- PWA・高解像度用 -->
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon-256.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />

    <!-- iOS / iPadOS タッチアイコン（推奨サイズ）-->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-256.png" />

    <!-- =====================================
         OGP
    ====================================== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="KISUI | 静けさの中にある美しさ" />
    <meta property="og:title" content="KISUI | 静けさの中にある美しさ" />
    <meta
      property="og:description"
      content="KISUI（綺水）は、肌と心に“静かな透明感”を届けるスキンケアウォーター。水のように軽く、敏感肌でも使いやすい、無香料・低刺激の化粧水です。"
    />
    <meta property="og:url" content="https://kisui.vercel.app/" />
    <meta
      property="og:image"
      content="https://kisui.vercel.app/og/kisui-og.png"
    />
    <meta property="og:locale" content="ja_JP" />

    <!-- =====================================
         Twitter Card
    ====================================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KISUI | 静けさの中にある美しさ" />
    <meta
      name="twitter:description"
      content="肌にやさしい“水のような”スキンケアウォーター、KISUI（綺水）。無香料・低刺激で、毎日のスキンケアに静かな透明感を。"
    />
    <meta
      name="twitter:image"
      content="https://kisui.vercel.app/og/kisui-og.png"
    />

    <!-- =====================================
         jQuery & Ripples
    ====================================== -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/jquery.ripples/dist/jquery.ripples-min.js"></script>
  </head>

  <body>
    <div id="root"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const initRipples = () => {
          const target = document.querySelector(".kisui-hero-bg");
          if (!target || !window.jQuery) return;

          try {
            window.jQuery(target).ripples({
              resolution: 256,
              dropRadius: 18,
              perturbance: 0.035,
            });
          } catch (e) {
            console.warn("Ripples failed:", e);
          }
        };

        initRipples();
        setTimeout(initRipples, 800);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
