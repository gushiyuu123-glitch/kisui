<!doctype html>
<html lang="ja">
  <head>
    <!-- =====================================
         基本設定
    ====================================== -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta name="google" content="notranslate" />

    <!-- =====================================
         タイトル & ベース SEO
    ====================================== -->
    <title>KISUI | 静けさの中にある美しさ</title>

    <!-- ※ description は検索結果＆OGP 両方で使われる想定 -->
    <meta
      name="description"
      content="KISUI（綺水）は、肌と心に“静かな透明感”を届けるスキンケアウォーター。水のように軽く、敏感肌でも使いやすい、無香料・低刺激の化粧水です。"
    />
    <meta
      name="keywords"
      content="KISUI, 綺水, 化粧水, スキンケア, 敏感肌, 無香料, 保湿, 透明感, 美容液, スキンケアウォーター"
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://kisui.vercel.app/" />

    <!-- =====================================
         Favicon / App Icons
         ※ public/ 以下にファイルを置く
    ====================================== -->
    <!-- 32x32 / 16x16 は最低用意しておくと安心 -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />
    <!-- SVG ロゴがあるなら -->
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->

    <!-- iOS 用 タッチアイコン（任意、用意できたら） -->
    <!-- <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" /> -->

    <!-- =====================================
         OGP（Open Graph Protocol）
    ====================================== -->
    <meta property="og:type" content="website" />
    <meta
      property="og:site_name"
      content="KISUI | 静けさの中にある美しさ"
    />
    <meta
      property="og:title"
      content="KISUI | 静けさの中にある美しさ"
    />
    <meta
      property="og:description"
      content="KISUI（綺水）は、肌と心に“静かな透明感”を届けるスキンケアウォーター。水のように軽く、敏感肌でも使いやすい、無香料・低刺激の化粧水です。"
    />
    <meta property="og:url" content="https://kisui.vercel.app/" />

    <!-- 1200x630 か 1200x628 推奨。public/og/kisui-og.png を想定 -->
    <meta
      property="og:image"
      content="https://kisui.vercel.app/og/kisui-og.png"
    />
    <meta property="og:locale" content="ja_JP" />

    <!-- =====================================
         Twitter Card
    ====================================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="KISUI | 静けさの中にある美しさ"
    />
    <meta
      name="twitter:description"
      content="肌にやさしい“水のような”スキンケアウォーター、KISUI（綺水）。無香料・低刺激で、毎日のスキンケアに静かな透明感を。"
    />
    <meta
      name="twitter:image"
      content="https://kisui.vercel.app/og/kisui-og.png"
    />

    <!-- （任意）ブランドを分けたいとき -->
    <!-- <meta name="twitter:site" content="@your_account" /> -->

    <!-- =====================================
         パフォーマンス系（任意）
         画像を先読みしたくなったら使う
    ====================================== -->
    <!--
    <link
      rel="preload"
      as="image"
      href="/og/kisui-og.png"
    />
    -->

    <!-- =====================================
         jQuery & Ripples（React より先）
    ====================================== -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/jquery.ripples/dist/jquery.ripples-min.js"></script>
  </head>

  <body>
    <div id="root"></div>

    <!-- ======================
         Ripple 初期化
         （.kisui-hero-bg が DOM に現れたあとでも動くように）
    ======================= -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const initRipples = () => {
          const target = document.querySelector(".kisui-hero-bg");
          if (!target || !window.jQuery) return;

          try {
            window.jQuery(target).ripples({
              resolution: 256,
              dropRadius: 18,
              perturbance: 0.035,
            });
          } catch (e) {
            console.warn("Ripples failed:", e);
          }
        };

        // 初回
        initRipples();

        // React マウントが遅れた場合に備えて少し遅延チェックも入れておく
        setTimeout(initRipples, 800);
      });
    </script>

    <!-- =====================================
         React / Vite エントリーポイント
         （重複しないように 1つだけ）
    ====================================== -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
